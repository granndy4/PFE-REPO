spring:
  application:
    name: fuel-voucher-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/fuel_voucher?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Africa/Tunis}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  security:
    jwt:
      secret: ${APP_JWT_SECRET:MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTIzNDU2Nzg5MDE=}
      expiration-ms: ${APP_JWT_EXPIRATION_MS:86400000}
  bootstrap-admin:
    enabled: ${APP_BOOTSTRAP_ADMIN_ENABLED:true}
    name: ${APP_BOOTSTRAP_ADMIN_NAME:Admin}
    email: ${APP_BOOTSTRAP_ADMIN_EMAIL:admin@wtm.local}
    password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:Admin@12345}
